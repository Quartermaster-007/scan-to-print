name: Build and Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2026.03.11.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "__version__ = \"${VERSION}\"" > version.py
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "PRERELEASE=${{ github.event.inputs.prerelease || 'false' }}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Stamp version info
        shell: python
        run: |
          import re, os
          v = os.environ["VERSION"]
          parts = [int(x) for x in v.split(".")]
          parts += [0] * (4 - len(parts))
          t = tuple(parts[:4])
          with open("file_version_info.py", encoding="utf-8") as f:
              txt = f.read()
          txt = re.sub(r"filevers=\(.*?\)", f"filevers={t}", txt)
          txt = re.sub(r"prodvers=\(.*?\)", f"prodvers={t}", txt)
          for k in ("FileVersion", "ProductVersion"):
              txt = re.sub(
                  rf"StringStruct\(u'{k}',\s*u'[^']*'\)",
                  f"StringStruct(u'{k}', u'{v}')",
                  txt,
              )
          with open("file_version_info.py", "w", encoding="utf-8") as f:
              f.write(txt)

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python -m PyInstaller ScanToPrint.spec --noconfirm

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          prerelease: ${{ env.PRERELEASE }}
          files: dist/ScanToPrint.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
