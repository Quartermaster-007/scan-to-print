name: Build and Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2026.03.11.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "__version__ = \"${VERSION}\"" > version.py
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "PRERELEASE=${{ github.event.inputs.prerelease || 'false' }}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python -m PyInstaller ScanToPrint.spec --noconfirm

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          prerelease: ${{ env.PRERELEASE }}
          files: dist/ScanToPrint.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
